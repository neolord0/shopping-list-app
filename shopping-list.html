<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #5a67d8;
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.82rem;
      color: #718096;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .btn-clear:hover {
      background: #fff5f5;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 4px;
      border-bottom: 1px solid #f0f4f8;
      transition: opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li:last-child {
      border-bottom: none;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .checkbox.checked {
      background: #48bb78;
      border-color: #48bb78;
    }

    .checkbox.checked::after {
      content: '';
      display: block;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      transition: color 0.2s, text-decoration 0.2s;
      word-break: break-all;
    }

    li.done .item-text {
      color: #a0aec0;
      text-decoration: line-through;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 40px 0 20px;
    }

    .empty span {
      display: block;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 사야 할 것들을 추가해 보세요.</p>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="60">
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="summary">
      <span id="countText">항목 없음</span>
      <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <div id="empty" class="empty">
      <span>🧺</span>
      리스트가 비어 있어요.
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'shopping_list_v1';
    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    const input    = document.getElementById('itemInput');
    const listEl   = document.getElementById('list');
    const emptyEl  = document.getElementById('empty');
    const countEl  = document.getElementById('countText');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = '';
      emptyEl.style.display = items.length === 0 ? 'block' : 'none';

      items.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        const box = document.createElement('div');
        box.className = 'checkbox' + (item.done ? ' checked' : '');
        box.onclick = () => toggle(i);

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'btn-delete';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => remove(i);

        li.append(box, text, del);
        listEl.appendChild(li);
      });

      const total = items.length;
      const done  = items.filter(it => it.done).length;
      countEl.textContent = total === 0
        ? '항목 없음'
        : `총 ${total}개 · 완료 ${done}개`;
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      items.unshift({ name, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(i) {
      items[i].done = !items[i].done;
      save();
      render();
    }

    function remove(i) {
      items.splice(i, 1);
      save();
      render();
    }

    function clearDone() {
      const before = items.length;
      items = items.filter(it => !it.done);
      if (items.length === before) return;
      save();
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
