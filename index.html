<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #5a67d8; }
    .btn-add:active { transform: scale(0.97); }
    .btn-add:disabled { background: #a0aec0; cursor: not-allowed; }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.82rem;
      color: #718096;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .btn-clear:hover { background: #fff5f5; }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 4px;
      border-bottom: 1px solid #f0f4f8;
      transition: opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li:last-child { border-bottom: none; }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .checkbox.checked {
      background: #48bb78;
      border-color: #48bb78;
    }

    .checkbox.checked::after {
      content: '';
      display: block;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      transition: color 0.2s, text-decoration 0.2s;
      word-break: break-all;
    }

    li.done .item-text {
      color: #a0aec0;
      text-decoration: line-through;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 40px 0 20px;
    }

    .empty span {
      display: block;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 40px 0 20px;
    }

    .error-msg {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 사야 할 것들을 추가해 보세요.</p>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="60">
      <button class="btn-add" id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <div class="summary">
      <span id="countText">불러오는 중...</span>
      <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    </div>

    <div id="loading" class="loading">⏳ 데이터를 불러오는 중...</div>
    <ul id="list"></ul>
    <div id="empty" class="empty" style="display:none;">
      <span>🧺</span>
      리스트가 비어 있어요.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL  = 'https://ywsnmslpursqrkrpoank.supabase.co';
    const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3c25tc2xwdXJzcXJrcnBvYW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MDczOTAsImV4cCI6MjA4NzM4MzM5MH0.40rvyRLZsfcEnvvq91aAOG72ANmkNYvnwOu6TGEsaH4';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    const input    = document.getElementById('itemInput');
    const addBtn   = document.getElementById('addBtn');
    const listEl   = document.getElementById('list');
    const emptyEl  = document.getElementById('empty');
    const loadingEl = document.getElementById('loading');
    const countEl  = document.getElementById('countText');
    const errorEl  = document.getElementById('errorMsg');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      setTimeout(() => { errorEl.style.display = 'none'; }, 4000);
    }

    function render() {
      loadingEl.style.display = 'none';
      listEl.innerHTML = '';
      emptyEl.style.display = items.length === 0 ? 'block' : 'none';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        const box = document.createElement('div');
        box.className = 'checkbox' + (item.done ? ' checked' : '');
        box.onclick = () => toggle(item.id, item.done);

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'btn-delete';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => remove(item.id);

        li.append(box, text, del);
        listEl.appendChild(li);
      });

      const total = items.length;
      const done  = items.filter(it => it.done).length;
      countEl.textContent = total === 0
        ? '항목 없음'
        : `총 ${total}개 · 완료 ${done}개`;
    }

    async function fetchItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('id, name, done, created_at')
        .order('created_at', { ascending: false });

      if (error) { showError('데이터를 불러오지 못했습니다.'); loadingEl.style.display = 'none'; return; }
      items = data;
      render();
    }

    async function addItem() {
      const name = input.value.trim();
      if (!name) { input.focus(); return; }

      addBtn.disabled = true;
      const { data, error } = await db
        .from('shopping_items')
        .insert([{ name, done: false }])
        .select('id, name, done, created_at')
        .single();
      addBtn.disabled = false;

      if (error) { showError('항목을 추가하지 못했습니다.'); return; }
      items.unshift(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggle(id, currentDone) {
      const { error } = await db
        .from('shopping_items')
        .update({ done: !currentDone, updated_at: new Date().toISOString() })
        .eq('id', id);

      if (error) { showError('상태를 변경하지 못했습니다.'); return; }
      const item = items.find(it => it.id === id);
      if (item) item.done = !currentDone;
      render();
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { showError('항목을 삭제하지 못했습니다.'); return; }
      items = items.filter(it => it.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(it => it.done).map(it => it.id);
      if (doneIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) { showError('완료 항목을 삭제하지 못했습니다.'); return; }
      items = items.filter(it => !it.done);
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    fetchItems();
  </script>
</body>
</html>
